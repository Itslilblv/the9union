<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM SHAWARMA | دريم شاورما</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #121212;
            --primary: #ff6600;
            --danger: #ff4444;
            --text: #ffffff;
            --gray: #888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 160px;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #221100, #000);
            border-bottom: 1px solid #222;
        }

        .logo { font-size: 2.2rem; font-weight: 900; margin: 0; }
        .logo span { color: var(--primary); }

        .section-title {
            background: #1a1a1a;
            color: var(--primary);
            padding: 12px 20px;
            font-weight: 900;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--primary);
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            background: #1a1a1a;
            border-bottom: 1px solid #222;
        }

        .info { padding: 10px; flex-grow: 1; text-align: center; }
        .info h3 { font-size: 0.85rem; margin: 5px 0; min-height: 40px; color: var(--text); }
        .price { color: var(--primary); font-weight: 900; font-size: 1rem; margin-bottom: 8px; }

        .add-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .add-btn:active { transform: scale(0.95); background: #e65c00; }

        /* سلة المشتريات */
        .cart-overlay {
            position: fixed;
            bottom: 90px;
            left: 15px;
            right: 15px;
            background: #1a1a1a;
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
            z-index: 99;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
            font-size: 0.85rem;
        }

        .del-btn {
            color: var(--danger);
            background: none;
            border: 1px solid var(--danger);
            border-radius: 5px;
            padding: 0 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            z-index: 100;
            border-top: 1px solid #333;
        }

        .order-btn {
            background: var(--primary);
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-size: 1.15rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,102,0,0.3);
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">DREAM <span>SHAWARMA</span></h1>
    <p style="color: var(--gray); font-size: 0.8rem;">بحرة - طريق مكة القديم</p>
</header>

<div id="main-menu"></div>

<div id="cart-ui" class="cart-overlay">
    <p style="margin: 0 0 10px 0; color: var(--primary); font-weight: 900; font-size: 0.9rem;">مراجعة الطلبات:</p>
    <div id="cart-list"></div>
</div>

<div class="footer-bar">
    <button class="order-btn" onclick="checkout()">
        تأكيد عبر واتساب | <span id="total">0</span> SAR
    </button>
</div>

<script>
// القائمة الكاملة مع روابط صور مباشرة مستقرة
const menu = [
    { cat: "قسم الشاورما والباشكا", items: [
        { n: "شاورما دجاج صغير", p: 6, i: "https://raw.githubusercontent.com/itslilblv/dream-shawarma/main/images/shawarma.jpg" || "https://images.unsplash.com/photo-1561651823-34feb02250e4?w=300" },
        { n: "شاورما دجاج كبير", p: 8, i: "https://images.unsplash.com/photo-1662116765994-1e0200c4728d?w=300" },
        { n: "صحن عربي كبير", p: 19, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300" },
        { n: "صحن عربي كبير جبنة", p: 20, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300" },
        { n: "صحن عربي وسط", p: 16, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=300" },
        { n: "باشكا ايطاليا", p: 20, i: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300" }
    ]},
    { cat: "قسم البرجر والوجبات", items: [
        { n: "وجبة برجر دجاج", p: 15, i: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300" },
        { n: "وجبة برجر لحم حراق", p: 16, i: "https://images.unsplash.com/photo-1550317144-633190469b61?w=300" },
        { n: "وجبة دبل برجر", p: 21, i: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=300" },
        { n: "برجر زنجر بالجبنة", p: 9, i: "https://images.unsplash.com/photo-1512152272829-e3139592d56f?w=300" },
        { n: "برجر جمبري", p: 9, i: "https://images.unsplash.com/photo-1512152272829-e3139592d56f?w=300" },
        { n: "تورتيلا دجاج", p: 9, i: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300" }
    ]},
    { cat: "البطاطس والمشروبات", items: [
        { n: "بطاطس كرسبي كبير", p: 9, i: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" },
        { n: "صحن بطاطس وسط", p: 7, i: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300" },
        { n: "بيبسي / عصير", p: 2.5, i: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=300" },
        { n: "ماء", p: 1, i: "https://images.unsplash.com/photo-1548839140-29a749e1cf3d?w=300" }
    ]}
];

let cart = [];
let total = 0;

const menuDiv = document.getElementById('main-menu');
menu.forEach(s => {
    let html = `<div class="section-title">${s.cat}</div><div class="grid">`;
    s.items.forEach(item => {
        html += `
        <div class="card">
            <img src="${item.i}" onerror="this.src='https://via.placeholder.com/150/1a1a1a/ff6600?text=Dream+Food'">
            <div class="info">
                <h3>${item.n}</h3>
                <div class="price">${item.p} SAR</div>
                <button class="add-btn" onclick="add('${item.n}', ${item.p})">إضافة +</button>
            </div>
        </div>`;
    });
    html += `</div>`;
    menuDiv.innerHTML += html;
});

function add(n, p) {
    cart.push({ n, p, id: Date.now() });
    render();
}

function del(id) {
    cart = cart.filter(i => i.id !== id);
    render();
}

function render() {
    const list = document.getElementById('cart-list');
    const ui = document.getElementById('cart-ui');
    list.innerHTML = "";
    total = 0;
    
    if(cart.length > 0) {
        ui.style.display = "block";
        cart.forEach(i => {
            total += i.p;
            list.innerHTML += `
            <div class="cart-item">
                <span>${i.n}</span>
                <span>${i.p} ريال <button class="del-btn" onclick="del(${i.id})">×</button></span>
            </div>`;
        });
    } else {
        ui.style.display = "none";
    }
    document.getElementById('total').innerText = total.toFixed(2);
}

function checkout() {
    if(cart.length === 0) return alert("السلة فارغة!");
    const phone = "966546656090";
    let msg = "*طلب جديد من الموقع:*%0a%0a";
    cart.forEach(i => msg += `• ${i.n} (${i.p} ريال)%0a`);
    msg += `%0a*المجموع: ${total.toFixed(2)} ريال*`;
    window.open(`https://wa.me/${phone}?text=${msg}`);
}
</script>
</body>
</html>
