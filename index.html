<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM SHAWARMA | القائمة الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --primary: #ff6600; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 150px; }
        header { text-align: center; padding: 30px; background: linear-gradient(to bottom, #221100, #000); border-bottom: 1px solid #333; }
        .logo { font-size: 2rem; font-weight: 900; } .logo span { color: var(--primary); }
        .section-title { background: #1a1a1a; color: var(--primary); padding: 12px 20px; font-weight: 900; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 100px; object-fit: cover; filter: brightness(0.8); }
        .info { padding: 8px; text-align: center; flex-grow: 1; }
        .info h3 { font-size: 0.8rem; margin: 5px 0; height: 35px; overflow: hidden; }
        .price { color: var(--primary); font-weight: 900; font-size: 0.9rem; }
        .add-btn { background: var(--primary); color: #000; border: none; padding: 8px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 5px; border-radius: 5px; }
        
        /* سلة المشتريات */
        .cart-panel { position: fixed; bottom: 90px; left: 10px; right: 10px; background: #161616; border: 1px solid var(--primary); border-radius: 15px; padding: 15px; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 -5px 25px rgba(0,0,0,0.8); z-index: 1000; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 0.8rem; }
        .del { color: #ff4444; background: none; border: 1px solid #ff4444; border-radius: 5px; padding: 0 8px; cursor: pointer; }
        
        .footer { position: fixed; bottom: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); box-sizing: border-box; z-index: 1001; }
        .order-btn { background: var(--primary); color: #000; width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">DREAM <span>SHAWARMA</span></div>
    <p style="font-size: 0.8rem; margin: 5px 0; color: #aaa;">قائمة الطعام كاملة - أسعار شاملة الضريبة</p>
</header>

<div id="menu-content"></div>

<div id="cart-panel" class="cart-panel">
    <p style="color: var(--primary); font-weight: bold; margin-top: 0;">طلباتك:</p>
    <div id="cart-list"></div>
</div>

<div class="footer">
    <button class="order-btn" onclick="sendRequest()">إتمام الطلب (واتساب) | <span id="total-val">0</span> ريال</button>
</div>

<script>
const menuData = [
    { cat: "الشاورما والصفائح", items: [
        { n: "شاورما دجاج صغير", p: 6, i: "https://images.unsplash.com/photo-1561651823-34feb02250e4?w=200" },
        { n: "شاورما دجاج كبير", p: 8, i: "https://images.unsplash.com/photo-1662116765994-1e0200c4728d?w=200" },
        { n: "شاورما صغير بالجبنة", p: 7, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200" },
        { n: "شاورما كبير بالجبنة", p: 9, i: "https://images.unsplash.com/photo-1662116765994-1e0200c4728d?w=200" },
        { n: "صحن عربي كبير", p: 19, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200" },
        { n: "صحن عربي كبير بالجبنة", p: 20, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200" },
        { n: "صحن عربي وسط", p: 16, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200" },
        { n: "صحن عربي صغير", p: 12, i: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200" },
        { n: "باشكا ايطاليا", p: 20, i: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" }
    ]},
    { cat: "قسم البرجر والوجبات", items: [
        { n: "وجبة برجر دجاج", p: 15, i: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" },
        { n: "وجبة برجر دجاج بالجبنة", p: 16, i: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" },
        { n: "وجبة برجر دجاج حراق", p: 15, i: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200" },
        { n: "وجبة برجر لحم", p: 15, i: "https://images.unsplash.com/photo-1550317144-633190469b61?w=200" },
        { n: "وجبة برجر لحم بالجبنة", p: 16, i: "https://images.unsplash.com/photo-1550317144-633190469b61?w=200" },
        { n: "وجبة برجر لحم حراق بالجبنة", p: 16, i: "https://images.unsplash.com/photo-1550317144-633190469b61?w=200" },
        { n: "وجبة دبل برجر", p: 20, i: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=200" },
        { n: "وجبة دبل برجر بالجبنة", p: 21, i: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=200" },
        { n: "برجر زنجر بالجبنة", p: 9, i: "https://images.unsplash.com/photo-1512152272829-e3139592d56f?w=200" },
        { n: "برجر سمك", p: 8, i: "https://images.unsplash.com/photo-1512152272829-e3139592d56f?w=200" },
        { n: "برجر جمبري", p: 9, i: "https://images.unsplash.com/photo-1512152272829-e3139592d56f?w=200" },
        { n: "تورتيلا", p: 9, i: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" }
    ]},
    { cat: "البطاطس والمقبلات", items: [
        { n: "صحن بطاطس صغير", p: 5, i: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200" },
        { n: "صحن بطاطس وسط", p: 7, i: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200" },
        { n: "صحن بطاطس كبير", p: 15, i: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=200" },
        { n: "بطاطس كرسبي صغير", p: 6, i: "https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?w=200" },
        { n: "بطاطس كرسبي كبير", p: 9, i: "https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?w=200" },
        { n: "إضافة جبنة", p: 1, i: "https://images.unsplash.com/photo-1552767059-ce182ead6c1b?w=200" },
        { n: "بيبسي / عصير", p: 2.5, i: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=200" },
        { n: "ماء", p: 1, i: "https://images.unsplash.com/photo-1548839140-29a749e1cf3d?w=200" }
    ]}
];

let cart = [];
let total = 0;

const menuContainer = document.getElementById('menu-content');
menuData.forEach(section => {
    let html = `<div class="section-title">${section.cat}</div><div class="grid">`;
    section.items.forEach(item => {
        html += `
        <div class="card">
            <img src="${item.i}">
            <div class="info">
                <h3>${item.n}</h3>
                <div class="price">${item.p} SAR</div>
                <button class="add-btn" onclick="add('${item.n}', ${item.p})">إضافة +</button>
            </div>
        </div>`;
    });
    html += `</div>`;
    menuContainer.innerHTML += html;
});

function add(name, price) {
    cart.push({ name, price, id: Date.now() });
    updateCart();
}

function del(id) {
    cart = cart.filter(i => i.id !== id);
    updateCart();
}

function updateCart() {
    const list = document.getElementById('cart-list');
    const panel = document.getElementById('cart-panel');
    list.innerHTML = "";
    total = 0;
    
    if(cart.length > 0) {
        panel.style.display = "block";
        cart.forEach(i => {
            total += i.price;
            list.innerHTML += `<div class="cart-item"><span>${i.name}</span><span>${i.price} ريال <button class="del" onclick="del(${i.id})">×</button></span></div>`;
        });
    } else { panel.style.display = "none"; }
    document.getElementById('total-val').innerText = total;
}

function sendRequest() {
    if(cart.length === 0) return alert("السلة فارغة!");
    const phone = "966546656090";
    let msg = "*طلب جديد من الموقع:*%0a";
    cart.forEach(i => msg += `• ${i.name} (${i.price} ريال)%0a`);
    msg += `%0a*المجموع الكلي: ${total} ريال*`;
    window.open(`https://wa.me/${phone}?text=${msg}`);
}
</script>
</body>
</html>
