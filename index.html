<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM SHAWARMA | دريم شاورما</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #121212; --primary: #ff6600; --text: #fff; --danger: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 160px; }
        header { text-align: center; padding: 30px; background: linear-gradient(to bottom, #221100, #000); border-bottom: 1px solid #222; }
        .logo { font-size: 2.2rem; font-weight: 900; } .logo span { color: var(--primary); }
        .section-title { background: #1a1a1a; color: var(--primary); padding: 12px 20px; font-weight: 900; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); margin-top: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .card img { width: 100%; height: 110px; object-fit: cover; background: #222; }
        .info { padding: 10px; text-align: center; flex-grow: 1; }
        .info h3 { font-size: 0.85rem; margin: 5px 0; height: 40px; overflow: hidden; line-height: 1.2; }
        .price { color: var(--primary); font-weight: 900; font-size: 1rem; }
        .add-btn { background: var(--primary); color: #000; border: none; padding: 10px; font-weight: 900; cursor: pointer; width: 100%; }
        
        /* سلة الحذف */
        .cart-panel { position: fixed; bottom: 95px; left: 10px; right: 10px; background: #161616; border: 1px solid var(--primary); border-radius: 15px; padding: 15px; max-height: 200px; overflow-y: auto; display: none; z-index: 1000; box-shadow: 0 -5px 25px #000; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 0.85rem; }
        .del { color: var(--danger); background: none; border: 1px solid var(--danger); border-radius: 5px; padding: 0 8px; cursor: pointer; font-weight: bold; }
        
        .footer { position: fixed; bottom: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1001; border-top: 1px solid #333; }
        .order-btn { background: var(--primary); color: #000; width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">DREAM <span>SHAWARMA</span></div>
    <p style="color:#888; font-size:0.8rem;">بحرة - المنيو الكامل والأسعار</p>
</header>

<div id="menu-container"></div>

<div id="cart-panel" class="cart-panel">
    <p style="color:var(--primary); font-weight:bold; margin-top:0;">الطلبات المختارة (اضغط × للحذف):</p>
    <div id="cart-list"></div>
</div>

<div class="footer">
    <button class="order-btn" onclick="sendToWA()">تأكيد الطلب واتساب | <span id="total-price">0</span> ريال</button>
</div>

<script>
const fullMenu = [
    { cat: "ساندوتشات الشاورما", items: [
        { n: "شاورما دجاج صغير", p: 6, i: "https://images.deliveryhero.io/image/talabat/Menuitems/638202513904943960.jpg" },
        { n: "شاورما دجاج كبير", p: 8, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128472534131.jpg" },
        { n: "شاورما صغير بالجبنة", p: 7, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637841372332155355.jpg" },
        { n: "شاورما كبير بالجبنة", p: 9, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637841372332155355.jpg" },
        { n: "صاروخ دريم", p: 13, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128478440078.jpg" },
        { n: "صاروخ دريم بالجبنة", p: 14, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128478440078.jpg" }
    ]},
    { cat: "الصحون والباشكا", items: [
        { n: "صحن عربي صغير", p: 12, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128478440078.jpg" },
        { n: "صحن عربي وسط", p: 16, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128478440078.jpg" },
        { n: "صحن عربي كبير", p: 19, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128478440078.jpg" },
        { n: "صحن عربي كبير بالجبنة", p: 20, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128478440078.jpg" },
        { n: "باشكا ايطاليا", p: 20, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637841372332155355.jpg" },
        { n: "صحن شاورما (بدون خبز)", p: 22, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637841372332155355.jpg" }
    ]},
    { cat: "الوجبات والبرجر", items: [
        { n: "وجبة برجر دجاج", p: 15, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128482431633.jpg" },
        { n: "وجبة برجر لحم", p: 15, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128488330107.jpg" },
        { n: "وجبة دبل برجر", p: 20, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128488330107.jpg" },
        { n: "برجر زنجر جبنة", p: 9, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637841372338155255.jpg" },
        { n: "تورتيلا دجاج", p: 9, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637841372338155255.jpg" },
        { n: "برجر سمك", p: 8, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637841372338155255.jpg" }
    ]},
    { cat: "المقبلات والشراب", items: [
        { n: "بطاطس كرسبي كبير", p: 9, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128492236319.jpg" },
        { n: "صحن بطاطس وسط", p: 7, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128492236319.jpg" },
        { n: "بيبسي / عصير", p: 2.5, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128504031633.jpg" },
        { n: "إضافة جبنة", p: 1, i: "https://images.deliveryhero.io/image/talabat/Menuitems/637380128504031633.jpg" }
    ]}
];

let cart = [];
let total = 0;

const menuDiv = document.getElementById('menu-container');
fullMenu.forEach(section => {
    let html = `<div class="section-title">${section.cat}</div><div class="grid">`;
    section.items.forEach(item => {
        html += `
        <div class="card">
            <img src="${item.i}" onerror="this.src='https://via.placeholder.com/300x200/111/ff6600?text=Dream+Shawarma'">
            <div class="info">
                <h3>${item.n}</h3>
                <div class="price">${item.p} ريال</div>
            </div>
            <button class="add-btn" onclick="addToCart('${item.n}', ${item.p})">إضافة +</button>
        </div>`;
    });
    html += `</div>`;
    menuDiv.innerHTML += html;
});

function addToCart(n, p) {
    cart.push({ n, p, id: Date.now() });
    updateUI();
}

function delItem(id) {
    cart = cart.filter(i => i.id !== id);
    updateUI();
}

function updateUI() {
    const list = document.getElementById('cart-list');
    const panel = document.getElementById('cart-panel');
    list.innerHTML = "";
    total = 0;
    if(cart.length > 0) {
        panel.style.display = "block";
        cart.forEach(i => {
            total += i.p;
            list.innerHTML += `<div class="cart-item"><span>${i.n}</span><span>${i.p} ريال <button class="del" onclick="delItem(${i.id})">×</button></span></div>`;
        });
    } else { panel.style.display = "none"; }
    document.getElementById('total-price').innerText = total;
}

function sendToWA() {
    if(cart.length === 0) return alert("السلة فارغة!");
    const phone = "966546656090";
    let msg = "*طلب جديد - دريم شاورما*%0a";
    cart.forEach(i => msg += `• ${i.n} (${i.p} ريال)%0a`);
    msg += `%0a*المجموع النهائي: ${total} ريال*`;
    window.open(`https://wa.me/${phone}?text=${msg}`);
}
</script>
</body>
</html>
