<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM SHAWARMA | عالم من الأحلام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --primary: #ff6600;
            --danger: #ff3333; /* لون الحذف */
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 120px;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(to bottom, #1a100a, transparent);
        }

        .logo { font-size: 2.2rem; font-weight: 900; margin: 0; }
        .logo span { color: var(--primary); }

        .section-title {
            padding: 15px 20px;
            font-size: 1.3rem;
            color: var(--primary);
            background: #1a1a1a;
            margin: 20px 0;
        }

        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* عرض صنفين في الجوال */
            gap: 10px;
            padding: 10px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .menu-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #222; /* لون مؤقت لين تحط الصور */
        }

        .card-info { padding: 10px; flex-grow: 1; text-align: center; }
        .card-info h3 { font-size: 0.9rem; margin: 5px 0; height: 40px; overflow: hidden; }
        .price { color: var(--primary); font-weight: bold; margin-bottom: 10px; }

        .add-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- سلة المشتريات الذكية --- */
        .cart-summary {
            position: fixed;
            bottom: 80px;
            left: 5%;
            right: 5%;
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--primary);
            max-height: 200px;
            overflow-y: auto;
            display: none; /* تظهر فقط عند وجود طلبات */
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding: 5px 0;
            font-size: 0.85rem;
        }

        .delete-btn {
            color: var(--danger);
            background: none;
            border: 1px solid var(--danger);
            border-radius: 5px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .order-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .order-now-btn {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">DREAM <span>SHAWARMA</span></h1>
        <p style="font-size: 0.8rem; color: #888;">اطلب وجبتك المفضلة بضغطة زر</p>
    </header>

    <div id="menu-sections">
        </div>

    <div id="cart-summary" class="cart-summary">
        <h4 style="margin: 0 0 10px 0; font-size: 0.9rem;">طلباتك الحالية:</h4>
        <div id="cart-list"></div>
    </div>

    <div class="order-bar">
        <button class="order-now-btn" onclick="sendToWhatsApp()">
            إتمام الطلب | <span id="total-price">0</span> SAR
        </button>
    </div>

    <script>
        // داتا المنيو الكاملة من الصورة
        const menuData = [
            { cat: "قسم الشاورما", items: [
                { name: "شاورما دجاج صغير", price: 6, img: "https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400" },
                { name: "شاورما دجاج كبير", price: 8, img: "https://images.unsplash.com/photo-1662116765994-1e0200c4728d?w=400" },
                { name: "صحن عربي كبير", price: 19, img: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=400" },
                { name: "باشكا ايطاليا", price: 20, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" }
            ]},
            { cat: "الوجبات", items: [
                { name: "وجبة برجر دجاج", price: 15, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" },
                { name: "وجبة برجر لحم حراق", price: 16, img: "https://images.unsplash.com/photo-1550317144-633190469b61?w=400" },
                { name: "وجبة دبل برجر", price: 21, img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=400" }
            ]},
            { cat: "المقبلات والجانبيات", items: [
                { name: "بطاطس كرسبي كبير", price: 9, img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=400" },
                { name: "صحن بطاطس وسط", price: 7, img: "https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?w=400" },
                { name: "بيبسي / عصير", price: 2.5, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }
            ]}
        ];

        let cart = [];
        let total = 0;

        // بناء المنيو تلقائياً
        const menuContainer = document.getElementById('menu-sections');
        menuData.forEach(section => {
            let sectionHTML = `<div class="section-title">${section.cat}</div><div class="items-grid">`;
            section.items.forEach(item => {
                sectionHTML += `
                    <div class="menu-card">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="card-info">
                            <h3>${item.name}</h3>
                            <div class="price">${item.price} SAR</div>
                            <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">إضافة للسلة</button>
                        </div>
                    </div>`;
            });
            sectionHTML += `</div>`;
            menuContainer.innerHTML += sectionHTML;
        });

        function addToCart(name, price) {
            cart.push({ name, price, id: Date.now() });
            updateUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateUI();
        }

        function updateUI() {
            const cartList = document.getElementById('cart-list');
            const cartSummary = document.getElementById('cart-summary');
            const totalPriceEl = document.getElementById('total-price');
            
            cartList.innerHTML = "";
            total = 0;

            if (cart.length > 0) {
                cartSummary.style.display = "block";
                cart.forEach(item => {
                    total += item.price;
                    cartList.innerHTML += `
                        <div class="cart-item">
                            <span>${item.name}</span>
                            <span>${item.price} ريال <button class="delete-btn" onclick="removeFromCart(${item.id})">حذف</button></span>
                        </div>`;
                });
            } else {
                cartSummary.style.display = "none";
            }
            totalPriceEl.innerText = total.toFixed(2);
        }

        function sendToWhatsApp() {
            if (cart.length === 0) return alert("السلة فارغة!");
            const phone = "966546656090";
            let msg = "*طلب جديد من الموقع:*%0a";
            cart.forEach(item => msg += `• ${item.name} (${item.price} ريال)%0a`);
            msg += `%0a*المجموع النهائي: ${total.toFixed(2)} ريال*`;
            window.open(`https://wa.me/${phone}?text=${msg}`);
        }
    </script>
</body>
</html>
